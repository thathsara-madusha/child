schemaVersion: 1.2

endpoints:
  - name: greeter-sample
    service:
      basePath: /data
      port: 9090
    type: REST
    networkVisibilities: 
      - Public
      - Organization

dependencies:
    connectionReferences:
    - name: con13
      resourceRef: storage:MyStore

configurations:
  env:
    - name: gitPAT
      valueFrom:
        configForm:
          displayName: GitHub Personal Access Token
          required: true
          type: secret
